server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/teamscope_db?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: teamscope
    password: Teamscope@2026

# MyBatis-Plus 配置
mybatis-plus:
  # 实体类包路径，用于别名扫描
  type-aliases-package: com.teamscope.entity
  # Mapper XML 文件位置（暂不使用 XML，全注解方式）
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    # 下划线转驼峰（默认开启）
    map-underscore-to-camel-case: true
    # SQL 日志输出（开发环境开启）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 逻辑删除字段名（预留）
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
